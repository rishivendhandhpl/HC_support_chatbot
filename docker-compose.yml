services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hc}
      POSTGRES_DB: ${POSTGRES_DB:-hc_chatbot}
    ports:
      - "5433:5432"   # host 5433 -> container 5432 (avoids native Postgres on 5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      STORE_BACKEND: pgvector
      DATABASE_URL: postgresql://${POSTGRES_USER:-hc}:${POSTGRES_PASSWORD:-hc}@db:5432/${POSTGRES_DB:-hc_chatbot}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  widget:
    build: ./widget
    ports:
      - "8080:80"

volumes:
  pgdata:
